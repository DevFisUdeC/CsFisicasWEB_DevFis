<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{% block meta_description %}Departamento de Física, Facultad de Ciencias Físicas y Matemáticas, Universidad de Concepción.{% endblock %}">
    <title>{% block title %}{{ page_title }} — {{ site_name }}{% endblock %}</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <!-- Stylesheets (modular, cada uno con responsabilidad individual) -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/design-system.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/layout.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/components.css') }}">

    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- Skip link para accesibilidad -->
    <a href="#main-content" class="skip-link">Saltar al contenido principal</a>

    {% include 'components/navbar.html' %}

    <main id="main-content">
        {% block content %}{% endblock %}
    </main>

    {% include 'components/footer.html' %}

    <!-- Scripts -->
    <script>
        window.APP_DEBUG = {{ 'true' if config.DEBUG else 'false' }};
        window.sendClientTrace = function(eventName, payload) {
            if (!window.APP_DEBUG) return;
            try {
                const body = {
                    event: eventName || 'unknown',
                    path: window.location.pathname || '',
                    label: payload && payload.label ? String(payload.label).slice(0, 120) : '',
                    href: payload && payload.href ? String(payload.href).slice(0, 250) : '',
                    level: payload && payload.level ? String(payload.level).toLowerCase() : 'info',
                    meta: payload && payload.meta ? JSON.stringify(payload.meta).slice(0, 500) : ''
                };
                const query = new URLSearchParams(body).toString();
                fetch('/_trace/client-event?' + query, {
                    method: 'GET',
                    keepalive: true,
                    credentials: 'same-origin',
                }).catch(() => {});
            } catch (_) {}
        };
        window.appLog = function(level, message, payload) {
            if (!window.APP_DEBUG) return;
            const ts = new Date().toISOString();
            const prefix = '[APP ' + level + '] ' + ts + ' | ' + message;
            if (payload !== undefined) {
                console.log(prefix, payload);
            } else {
                console.log(prefix);
            }
        };
        window.appLog('INFO', 'Debug frontend habilitado', { path: window.location.pathname });
        window.sendClientTrace('page_view', { label: document.title || 'sin_titulo', level: 'info' });
    </script>
    <script src="{{ url_for('static', filename='js/navigation.js') }}"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% if config.DEBUG %}
    <script src="{{ url_for('static', filename='js/debug-trace.js') }}"></script>
    {% endif %}
    {% block extra_js %}{% endblock %}
</body>
</html>
